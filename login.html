<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PurpleWallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffffff, #f3e8ff);
        }

        .login-container {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(106, 13, 173, 0.2);
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #6a0dad;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #444;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #6a0dad;
            box-shadow: 0 0 8px rgba(106, 13, 173, 0.2);
        }

        .forgot {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot a {
            text-decoration: none;
            color: #6a0dad;
            font-size: 14px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 30px;
            background: #6a0dad;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #4b0082;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .register-link a {
            color: #6a0dad;
            text-decoration: none;
            font-weight: 600;
        }

        @media(max-width: 500px) {
            .login-container {
                width: 90%;
                padding: 30px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Welcome Back</h2>

    <form>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
        </div>

        <div class="forgot">
            <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-login" href="dashboard.html">Login</button>
    </form>

    <div class="register-link">
        Don't have an account? <a href="signup.html">Register</a>
    </div>
</div>

</body>
</html>

<script>
const form = document.querySelector("form");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.querySelector('input[type="email"]').value.trim();
    const password = document.querySelector('input[type="password"]').value.trim();

    if(email === "" || password === "") {
        alert("Please fill all fields");
        return;
    }

    // Fake user check (later connect to backend)
    if(email === "admin@example.com" && password === "123456") {

        // Save login session
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userEmail", email);

        window.location.href = "dashboard.html";
    } else {
        alert("Invalid login details");
    }
});
</script>

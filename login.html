<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>چوونەژوورەوە</title>

<!-- IBM Plex Sans Arabic -->
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"IBM Plex Sans Arabic", sans-serif;
    background:#f4f3ff;
}

/* Navbar */

nav{
    background:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.logo{
    font-size:22px;
    font-weight:700;
    color:#6a0dad;
}

.menu a{
    margin-right:20px;
    text-decoration:none;
    color:#333;
    font-weight:500;
}

/* Login Section */

.login-section{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 20px;
}

/* Login Card */

.login-card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.login-card h1{
    text-align:center;
    font-size:48px;
    color:#6a0dad;
    margin-bottom:25px;
}

/* Inputs */

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
}

.input-group input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    font-family:"IBM Plex Sans Arabic", sans-serif;
}

/* Button */

.btn{
    width:100%;
    background:#6a0dad;
    color:white;
    padding:14px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#4b0082;
}

/* Signup link */

.signup-link{
    text-align:center;
    margin-top:20px;
}

.signup-link a{
    color:#6a0dad;
    text-decoration:none;
    font-weight:600;
}

/* Footer */

footer{
    margin-top:50px;
    background:#6a0dad;
    color:white;
    text-align:center;
    padding:20px;
}

</style>
</head>

<body>

<!-- Navbar -->

<nav>

<div class="logo">
Vertex Wallet
</div>

<div class="menu">
<a href="home.html">سەرەکی</a>
<a href="about.html">دەربارە</a>
<a href="signup.html">دروستکرنا هژمارێ</a>
</div>

</nav>


<!-- Login -->

<section class="login-section">

<div class="login-card">

<h1>چوونەژوور</h1>

<form>

<div class="input-group">
<label>ئیمیل</label>
<input type="email" placeholder="ئیمیلی خو بنڤیسە">
</div>

<div class="input-group">
<label>ژمارا نهێنی</label>
<input type="password" placeholder="ژمارا نهێنی بنڤیسە">
</div>

<button class="btn">چوونەژوور</button>

</form>

<div class="signup-link">
هژمار تە هەیە ؟ <a href="signup.html">دروستکرنا هەژمارێ</a>
</div>

</div>

</section>


<footer>
© 2026 Vertex Wallet
</footer>

</body>
</html>

<script>
const form = document.querySelector("form");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.querySelector('input[type="email"]').value.trim();
    const password = document.querySelector('input[type="password"]').value.trim();

    if(email === "" || password === "") {
        alert("Please fill all fields");
        return;
    }

    // Fake user check (later connect to backend)
    if(email === "admin@example.com" && password === "123456") {

        // Save login session
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("userEmail", email);

        window.location.href = "dashboard.html";
    } else {
        alert("Invalid login details");
    }
});
</script>

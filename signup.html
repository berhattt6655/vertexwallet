<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دروستکردنی هەژمار</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:"IBM Plex Sans Arabic", sans-serif;
    background:#f4f3ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Signup Box */

.signup-container{
    width:420px;
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.signup-container h1{
    text-align:center;
    color:#6a0dad;
    font-size:36px;
    margin-bottom:25px;
}

/* Inputs */

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
}

.input-group input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    font-family:"IBM Plex Sans Arabic", sans-serif;
}

/* Button */

.btn{
    width:100%;
    background:#6a0dad;
    color:white;
    padding:14px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
}

.btn:hover{
    background:#4b0082;
}

/* Login link */

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#6a0dad;
    text-decoration:none;
    font-weight:600;
}

</style>
</head>

<body>

<div class="signup-container">

<h1> دروستکرنا هەژمارێ</h1>

<form>

<div class="input-group">
<label>ناڤێ تەمام</label>
<input type="text" placeholder="ناڤێ خو بنڤیسە">
</div>

<div class="input-group">
<label>ئیمیل</label>
<input type="email" placeholder="ئیمیلی خو بنڤیسە">
</div>

<div class="input-group">
<label>ژمارا نهێنی</label>
<input type="password" placeholder="ژمارا نهێنی دروستبکە">
</div>

<div class="input-group">
<label>دوبارەکرنا ژمارا نهێنی</label>
<input type="password" placeholder="ژمارا نهێنی دوبارە بنڤیسە">
</div>

<button class="btn">هژمارا خو دروست بکە</button>

</form>

<div class="login-link">
 تە هژمار هەیە ؟ <a href="login.html">چوونەژوور</a>
</div>

</div>

</body>
</html>

<script>
    const form = document.getElementById('signupForm');

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        let valid = true;

        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const confirmPassword = document.getElementById('confirmPassword').value.trim();

        document.querySelectorAll('.error').forEach(el => el.textContent = '');

        if (name === '') {
            document.getElementById('nameError').textContent = 'Name is required';
            valid = false;
        }

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            document.getElementById('emailError').textContent = 'Valid email is required';
            valid = false;
        }

        if (password.length < 6) {
            document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
            valid = false;
        }

        if (password !== confirmPassword) {
            document.getElementById('confirmError').textContent = 'Passwords do not match';
            valid = false;
        }

        if (valid) {
            alert('Account created successfully!');
            window.location.href = 'login.html';
        }
    });
</script>

</body>
</html>
